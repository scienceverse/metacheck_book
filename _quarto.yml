project:
  type: book
  output-dir: docs

book:
  title: "The Metacheck Manual"
  subtitle: "Automated Checks of Research Outputs for Best Practices"
  author: "Daniel Lakens"
  date: today
  description: >
    A guide to Metacheck, an R package providing a module based tool
    for checking scientific manuscripts and data repositories for best practices using 
    text search, R code, and optional LLM queries.
  site-url: https://scienceverse.github.io/metacheck_book/
  repo-url: https://github.com/scienceverse/metacheck_book
  repo-branch: main
  repo-actions: [edit, issue]
  sidebar:
    logo: https://scienceverse.github.io/metacheck/logo.png
    style: docked
    collapse-level: 1
  page-footer:
    left: "Built with [Quarto](https://quarto.org)."
    right: "[Metacheck package](https://scienceverse.github.io/metacheck/)"
  chapters:
    - index.qmd
    - part: "Getting Started"
      chapters:
        - chapters/intro.qmd
        - chapters/get-started.qmd
        - chapters/reading-a-paper.qmd
        - chapters/text-search.qmd
        - chapters/llms.qmd
        - chapters/papers-databases.qmd
        - chapters/creating-modules.qmd
    - part: "Modules"
      chapters:
        - chapters/mod-power.qmd
        - chapters/mod-prereg-check.qmd
        - chapters/mod-reg-check.qmd
        - chapters/mod-ethics-check.qmd
        - chapters/mod-funding-check.qmd
        - chapters/mod-coi-check.qmd
        - chapters/mod-marginal.qmd
        - chapters/mod-stat-check.qmd
        - chapters/mod-stat-p-exact.qmd
        - chapters/mod-stat-p-nonsig.qmd
        - chapters/mod-stat-effect-size.qmd
        - chapters/mod-repo-check.qmd
        - chapters/mod-code-check.qmd
        - chapters/mod-ref-pubpeer.qmd
        - chapters/mod-ref-retraction.qmd
        - chapters/mod-ref-replication.qmd
        - chapters/mod-ref-accuracy.qmd
        - chapters/mod-ref-summary.qmd
        - chapters/creating-a-report.qmd
    - part: "Using Metacheck Locally"
      chapters:
        - chapters/local-files.qmd
        - chapters/ollama.qmd

  appendices:
    - chapters/osf-schemas.qmd
    - chapters/function-reference.qmd

bibliography: include/book.bib
csl: include/apa.csl

format:
  html:
    theme:
      light: [cosmo, theme.scss]
    code-link: true
    code-copy: true
    toc: true

execute:
  freeze: true
  warning: false
  message: false
